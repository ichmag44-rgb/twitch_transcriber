<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitch Transcriber Master++</title>

<style>
body{
    background:#0b0b0f;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
    margin:40px;
}

.container{
    max-width:1000px;
    margin:auto;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#111;
    border:1px solid #333;
    color:white;
    border-radius:8px;
}

button{
    margin-top:15px;
    padding:14px;
    width:100%;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#7b5cff,#9b6bff);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.box{
    margin-top:30px;
    padding:20px;
    background:#111;
    border-radius:10px;
}

textarea{
    width:100%;
    height:250px;
    background:#0f0f14;
    border:1px solid #333;
    color:white;
    padding:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>Twitch Transcriber <span style="color:#8c6bff">Master++</span></h1>
<p>Live Search + Alerts + Auto Moments + Game Detector + Analytics</p>

<div class="box">

<label>Twitch URL</label>
<input id="url" placeholder="https://www.twitch.tv/videos/...">

<label>Modus</label>
<select id="mode">
<option value="vod">VOD</option>
<option value="live">LIVE</option>
</select>

<button onclick="startTranscription()">Start</button>

</div>

<div class="box">
<h3>Live Transkript</h3>
<textarea id="transcript" readonly></textarea>
</div>

<div class="box">
<h3>Instant Search</h3>
<input id="searchWord" placeholder="Wort eingeben...">
<button onclick="searchWord()">Suchen</button>
</div>

<div class="box">
<h3>Alerts</h3>
<input id="alerts" placeholder="z.B. rotate, clutch, aim">
<button onclick="setAlerts()">Setzen</button>
</div>

</div>

<script>

async function startTranscription(){

    const url = document.getElementById("url").value
    const mode = document.getElementById("mode").value

    const res = await fetch("/start",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            url:url,
            mode:mode
        })
    })

    const data = await res.json()

    console.log(data)

    if(data.message){
        alert(data.message)
    }

}

async function searchWord(){

    const word = document.getElementById("searchWord").value

    const res = await fetch("/search",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            word:word
        })
    })

    const data = await res.json()

    alert(JSON.stringify(data,null,2))

}

async function setAlerts(){

    const alerts = document.getElementById("alerts").value

    const res = await fetch("/alerts",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            alerts:alerts
        })
    })

    const data = await res.json()

    alert("Alerts gesetzt")

}

</script>

</body>
</html>
