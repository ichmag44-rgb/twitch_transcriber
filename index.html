<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf‑8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Twitch Transkription und Suche</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div class="wrapper">
      <h1>Video transkribieren</h1>
      <p>Füge die Adresse eines Videos ein und lasse das Gesagte erkennen.</p>
      <form method="post" action="{{ url_for('process') }}">
        <label for="video_url">Adresse des Videos</label>
        <input type="url" id="video_url" name="video_url" placeholder="https://www.twitch.tv/videos/…" required>
        <button type="submit">Transkribieren</button>
      </form>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <ul class="messages">
            {% for message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
          </ul>
        {% endif %}
      {% endwith %}
    </div>
  </body>
</html>
